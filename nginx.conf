server {
    listen 80;
    client_max_body_size 50M;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy cho API (bao gồm SSE streaming endpoints)
    location /api/ {
        proxy_pass http://chatbot_backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tắt buffering cho SSE streaming (quan trọng!)
        proxy_buffering off;
        proxy_cache off;

        # Header cho SSE — không nén response
        proxy_set_header Accept-Encoding "";

        # Timeout dài cho SSE stream + Live Chat
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Giữ WebSocket support cho Live Chat (vẫn dùng WS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket endpoint riêng cho Live Chat (vẫn cần WS)
    location /ws {
        proxy_pass http://chatbot_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}