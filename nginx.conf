server {
    listen 80;
    client_max_body_size 50M;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Sửa lại phần proxy cho API và WebSocket
    location /ws {  # Hoặc đường dẫn ws của bạn
        proxy_pass http://chatbot_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Tắt buffer để dữ liệu real-time đi nhanh hơn
        proxy_buffering off;
        proxy_read_timeout 86400; # Giữ connection sống lâu hơn
    }

    location /api/ {
        proxy_pass http://chatbot_backend:8000/; # Lưu ý dấu / ở cuối nếu muốn strip prefix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}